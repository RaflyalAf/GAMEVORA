<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Manage Store | Gamevora Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --sat: env(safe-area-inset-top); }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; 
            color: white; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        input, textarea, select { 
            background: rgba(0, 0, 0, 0.4) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            color: white; 
            transition: all 0.3s; 
        }
        input:focus, textarea:focus, select:focus { 
            border-color: #a855f7 !important; 
            outline: none; 
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.1); 
        }
        .btn-gradient { background: linear-gradient(to right, #a855f7, #3b82f6); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .active-scale:active { transform: scale(0.95); transition: 0.1s; }
        @media (max-width: 768px) { input, select, textarea { font-size: 16px !important; } }
    </style>
</head>
<body class="selection:bg-purple-500">

    <nav class="fixed w-full z-50 bg-black/50 backdrop-blur-md border-b border-white/5" style="padding-top: var(--sat);">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="admin.html" class="text-xl font-black italic tracking-tighter bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent uppercase">Gamevora Admin</a>
            <div class="flex gap-6 items-center">
                <a href="admin.html" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-white transition">Back to Master</a>
                <span class="w-1 h-1 bg-white/10 rounded-full"></span>
                <button onclick="resetForm()" class="text-[10px] font-black uppercase tracking-widest text-purple-400 hover:text-white transition">New Upload</button>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="mb-6">
                <h1 id="form-title" class="text-3xl font-black italic uppercase tracking-tighter leading-none">Vault Uploader</h1>
                <p class="text-gray-500 text-[10px] font-bold uppercase mt-2 tracking-[0.2em]">Management Interface V2.0</p>
            </div>

            <form id="game-form" class="space-y-6">
                <div class="glass-card p-8 rounded-[40px] space-y-6">
                    <input type="hidden" id="game-id">
                    
                    <div class="space-y-4">
                        <label class="text-[9px] font-black uppercase text-purple-400 tracking-widest ml-2">Product Identity</label>
                        <input type="text" id="title" placeholder="Game Title" class="w-full p-4 rounded-2xl text-sm" required>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="genre" placeholder="Genre (e.g. Action)" class="w-full p-4 rounded-2xl text-sm">
                            <select id="connectivity_type" class="w-full p-4 rounded-2xl text-sm">
                                <option value="Offline">Offline</option>
                                <option value="Online">Online</option>
                            </select>
                        </div>
                        <input type="url" id="thumbnail" placeholder="Thumbnail Image URL" class="w-full p-4 rounded-2xl text-sm" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Base Price</label>
                            <input type="number" id="price" placeholder="Price" class="w-full p-4 rounded-2xl text-sm font-bold" required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black uppercase text-green-500 ml-2">Promo Price</label>
                            <input type="number" id="discount_price" placeholder="Promo" class="w-full p-4 rounded-2xl text-sm font-bold">
                        </div>
                    </div>

                    <div class="flex items-center gap-3 p-4 bg-white/5 rounded-2xl border border-white/5 active-scale cursor-pointer">
                        <input type="checkbox" id="is_trending" class="w-5 h-5 accent-purple-600 cursor-pointer">
                        <label for="is_trending" class="text-[10px] font-black uppercase text-gray-300 cursor-pointer">🔥 Mark as Trending</label>
                    </div>

                    <div class="space-y-4">
                        <label class="text-[9px] font-black uppercase text-blue-400 tracking-widest ml-2">Minimum Specifications</label>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="min_os" placeholder="OS (Min)" class="p-3 rounded-xl text-[10px]">
                            <input type="text" id="min_cpu" placeholder="CPU (Min)" class="p-3 rounded-xl text-[10px]">
                            <input type="text" id="min_ram" placeholder="RAM (Min)" class="p-3 rounded-xl text-[10px]">
                            <input type="text" id="min_gpu" placeholder="GPU (Min)" class="p-3 rounded-xl text-[10px]">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Description / About</label>
                        <textarea id="description" rows="4" class="w-full p-4 rounded-2xl text-sm leading-relaxed" placeholder="Tell users about this game..."></textarea>
                    </div>
                </div>

                <div class="glass-card p-8 rounded-[40px] space-y-4">
                    <label class="text-[9px] font-black uppercase text-green-400 tracking-widest ml-2">Cloud Access Links (Max 5)</label>
                    <div id="links-container" class="space-y-3">
                        <script>
                            for(let i=0; i<5; i++) {
                                document.write(`
                                    <div class="link-row grid grid-cols-12 gap-2 bg-black/20 p-2 rounded-xl border border-white/5 transition-all focus-within:border-purple-500/50">
                                        <select class="col-span-3 rounded-lg px-1 py-2 text-[8px] font-bold uppercase bg-black">
                                            <option value="box">📦 File</option>
                                            <option value="tool">🛠️ Tool</option>
                                            <option value="fix">🔧 Fix</option>
                                            <option value="book">📖 Guide</option>
                                        </select>
                                        <input type="text" placeholder="Label" class="col-span-4 rounded-lg px-2 py-2 text-[9px] font-bold uppercase bg-black">
                                        <input type="url" placeholder="URL" class="col-span-5 rounded-lg px-2 py-2 text-[9px] bg-black">
                                    </div>
                                `);
                            }
                        </script>
                    </div>
                </div>

                <button type="submit" id="btn-submit" class="w-full btn-gradient py-5 rounded-[24px] font-black text-xs uppercase tracking-[0.2em] shadow-xl active-scale transition-all">
                    Push to Vault
                </button>
                
                <button type="button" id="btn-reset" onclick="resetForm()" class="w-full text-[9px] font-black text-gray-500 uppercase tracking-widest hidden hover:text-white transition-all">
                    Discard Changes
                </button>
            </form>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div class="glass-card rounded-[40px] overflow-hidden shadow-2xl border border-white/5">
                <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/[0.01]">
                    <div>
                        <h2 class="text-xl font-black italic uppercase">Inventory</h2>
                        <p class="text-[8px] font-bold text-gray-500 uppercase mt-1">Live Database Status</p>
                    </div>
                    <span id="game-count" class="bg-purple-500/20 text-purple-400 border border-purple-500/30 px-4 py-1.5 rounded-full text-[10px] font-black">0 Items</span>
                </div>
                
                <div class="overflow-x-auto custom-scroll" style="max-height: 850px;">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-white/5 text-[9px] font-black uppercase tracking-widest text-gray-500 sticky top-0 z-10 backdrop-blur-md">
                            <tr>
                                <th class="px-8 py-5">Product</th>
                                <th class="px-8 py-5">Status</th>
                                <th class="px-8 py-5">Price</th>
                                <th class="px-8 py-5 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="game-list" class="divide-y divide-white/5">
                            <tr><td colspan="4" class="px-8 py-20 text-center text-gray-600 uppercase text-[10px] font-black italic animate-pulse">Syncing Vault...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://meruqlvbymsaeaxybxaz.supabase.co';
        const SB_KEY = 'sb_publishable_JpMK5MzO-awEkOOvr7t-xg_bBkobHLf'; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        
        const form = document.getElementById('game-form');
        const gameList = document.getElementById('game-list');
        const gameCountLabel = document.getElementById('game-count');

        // 1. Fetch Data
        async function fetchGames() {
            try {
                const { data: games, error } = await _supabase.from('games').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                renderGames(games);
                gameCountLabel.innerText = `${games.length} Items`;
            } catch (err) {
                console.error(err);
            }
        }

        // 2. Render List
        function renderGames(games) {
            if (!games.length) { 
                gameList.innerHTML = `<tr><td colspan="4" class="p-20 text-center opacity-30 uppercase text-[10px] font-black tracking-widest italic text-white">The Vault is Empty</td></tr>`; 
                return; 
            }
            
            gameList.innerHTML = games.map(g => `
                <tr class="hover:bg-white/[0.02] transition-all group">
                    <td class="px-8 py-5 flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl overflow-hidden border border-white/10 flex-shrink-0">
                            <img src="${g.thumbnail}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex flex-col">
                            <span class="text-xs font-black uppercase text-white tracking-tighter truncate max-w-[150px]">${g.title}</span>
                            <span class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">${g.genre || 'License'}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5">
                        <span class="text-[7px] font-black px-3 py-1 rounded-full border ${g.is_trending ? 'text-red-500 border-red-500/20 bg-red-500/5 animate-pulse' : 'text-gray-500 border-white/10'} uppercase italic">
                            ${g.is_trending ? 'Trending' : 'Standard'}
                        </span>
                    </td>
                    <td class="px-8 py-5">
                        <p class="text-[10px] font-black text-white">Rp${(g.discount_price || g.price).toLocaleString('id-ID')}</p>
                    </td>
                    <td class="px-8 py-5 text-right space-x-4">
                        <button onclick="editGame('${g.id}')" class="text-blue-400 font-black text-[9px] uppercase hover:text-white transition-all underline underline-offset-4 decoration-blue-500/20">Edit</button>
                        <button onclick="deleteGame('${g.id}')" class="text-red-500 font-black text-[9px] uppercase hover:text-white transition-all">Del</button>
                    </td>
                </tr>
            `).join('');
        }

        // 3. Handle Submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('game-id').value;
            const btn = document.getElementById('btn-submit');
            btn.innerText = "PROCESSING..."; btn.disabled = true;

            const links = [];
            document.querySelectorAll('.link-row').forEach(row => {
                const url = row.querySelector('input[type="url"]').value.trim();
                const label = row.querySelector('input[type="text"]').value.trim();
                const icon = row.querySelector('select').value;
                if(url) links.push({ icon, label: label || "Download", url });
            });

            const payload = {
                title: document.getElementById('title').value,
                genre: document.getElementById('genre').value,
                connectivity_type: document.getElementById('connectivity_type').value,
                thumbnail: document.getElementById('thumbnail').value,
                price: parseInt(document.getElementById('price').value),
                discount_price: parseInt(document.getElementById('discount_price').value) || 0,
                is_trending: document.getElementById('is_trending').checked,
                description: document.getElementById('description').value,
                download_links: links,
                specifications: {
                    minimum: { 
                        os: document.getElementById('min_os').value, 
                        cpu: document.getElementById('min_cpu').value, 
                        ram: document.getElementById('min_ram').value, 
                        gpu: document.getElementById('min_gpu').value 
                    }
                },
                updated_at: new Date().toISOString()
            };

            try {
                const { error } = id ? 
                    await _supabase.from('games').update(payload).eq('id', id) : 
                    await _supabase.from('games').insert([payload]);

                if (error) throw error;
                alert("Success! Vault Sync Completed.");
                resetForm();
                fetchGames();
            } catch (err) {
                alert(err.message);
            } finally {
                btn.innerText = "Push to Vault"; btn.disabled = false;
            }
        });

        // 4. Edit Game
        window.editGame = async (id) => {
            const { data: g, error } = await _supabase.from('games').select('*').eq('id', id).single();
            if (error || !g) return;

            // Main Info
            document.getElementById('game-id').value = g.id;
            document.getElementById('title').value = g.title;
            document.getElementById('genre').value = g.genre || '';
            document.getElementById('connectivity_type').value = g.connectivity_type || 'Offline';
            document.getElementById('thumbnail').value = g.thumbnail;
            document.getElementById('price').value = g.price;
            document.getElementById('discount_price').value = g.discount_price || '';
            document.getElementById('is_trending').checked = g.is_trending || false;
            document.getElementById('description').value = g.description || '';

            // Specs
            if(g.specifications?.minimum) {
                const m = g.specifications.minimum;
                document.getElementById('min_os').value = m.os || '';
                document.getElementById('min_cpu').value = m.cpu || '';
                document.getElementById('min_ram').value = m.ram || '';
                document.getElementById('min_gpu').value = m.gpu || '';
            }

            // Links
            const rows = document.querySelectorAll('.link-row');
            rows.forEach((row, i) => { 
                const linkData = g.download_links?.[i];
                row.querySelector('select').value = linkData?.icon || 'box';
                row.querySelector('input[type="text"]').value = linkData?.label || '';
                row.querySelector('input[type="url"]').value = linkData?.url || '';
            });

            // UI Adjust
            document.getElementById('form-title').innerText = "Update Record";
            document.getElementById('btn-submit').innerText = "Update Vault Item";
            document.getElementById('btn-reset').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 5. Reset & Delete
        window.resetForm = () => {
            form.reset();
            document.getElementById('game-id').value = '';
            document.getElementById('form-title').innerText = "Vault Uploader";
            document.getElementById('btn-submit').innerText = "Push to Vault";
            document.getElementById('btn-reset').classList.add('hidden');
        };

        window.deleteGame = async (id) => {
            if (confirm("🚨 WARNING: Delete this record forever?")) {
                const { error } = await _supabase.from('games').delete().eq('id', id);
                if (!error) fetchGames();
            }
        };

        // Init
        document.addEventListener('DOMContentLoaded', fetchGames);
    </script>
</body>
</html>
