<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Orders | Gamevora Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sat: env(safe-area-inset-top);
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; 
            color: white; 
            -webkit-tap-highlight-color: transparent;
        }
        .glass-nav { 
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            padding-top: var(--sat);
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .active-scale:active { transform: scale(0.95); transition: 0.1s; }
        
        @media (max-width: 768px) {
            .order-row { flex-direction: column; gap: 15px; }
            .action-btns { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body class="selection:bg-purple-500 min-h-screen">

    <nav class="fixed w-full z-50 glass-nav border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="admin.html" class="text-xl font-black italic tracking-tighter bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent uppercase">Gamevora Admin</a>
            <div class="flex gap-4 md:gap-6 items-center">
                <span class="hidden md:inline text-[10px] text-gray-500 font-bold uppercase tracking-widest">Order Manager</span>
                <a href="admin.html" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-white transition flex items-center gap-2 active-scale">
                    <span>←</span> <span class="hidden md:inline">Dashboard</span><span class="md:hidden">Back</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-4 md:px-6 max-w-6xl mx-auto">
        <div class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-black tracking-tighter italic uppercase leading-none">Order Management</h1>
                <p class="text-gray-500 text-xs md:text-sm mt-2 font-medium">Verifikasi pembayaran manual untuk akses Vault.</p>
            </div>
            <div id="live-indicator" class="flex items-center gap-2 px-4 py-2 bg-green-500/10 border border-green-500/20 rounded-full">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[9px] font-black text-green-500 uppercase tracking-widest leading-none">Live Monitoring</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-card p-6 rounded-[30px] border-l-4 border-yellow-500 shadow-xl">
                <p class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Pending Requests</p>
                <h2 id="count-pending" class="text-4xl font-black mt-2 text-yellow-500 tracking-tighter leading-none">0</h2>
            </div>
        </div>

        <div class="glass-card rounded-[35px] md:rounded-[40px] overflow-hidden shadow-2xl">
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white/5 text-[9px] md:text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">
                        <tr>
                            <th class="px-6 md:px-8 py-6">User / Proof</th>
                            <th class="px-6 md:px-8 py-6">Game Content</th>
                            <th class="px-6 md:px-8 py-6 hidden md:table-cell">Timestamp</th>
                            <th class="px-6 md:px-8 py-6 text-right">Decision</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body" class="divide-y divide-white/5">
                        <tr>
                            <td colspan="4" class="px-8 py-20 text-center text-gray-600 uppercase text-xs font-black animate-pulse">
                                Syncing with Vault Database...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://meruqlvbymsaeaxybxaz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JpMK5MzO-awEkOOvr7t-xg_bBkobHLf'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const notifySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        // Security Check (Cek Email Admin)
        async function protectPage() {
            const { data: { user } } = await _supabase.auth.getUser();
            const allowedEmails = ['raflyalfazari622@gmail.com', 'fadhilakbar050@gmail.com'];
            
            if (!user || !allowedEmails.includes(user.email)) {
                window.location.href = "index.html";
            }
        }

        // Fetch Data dari Tabel Library
        async function fetchOrders() {
            const container = document.getElementById('orders-table-body');
            try {
                const { data: orders, error } = await _supabase
                    .from('library')
                    .select('id, status, user_id, game_id, proof_url, created_at, games(title)')
                    .eq('status', 'pending')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                renderOrders(orders);
                document.getElementById('count-pending').innerText = orders.length;

            } catch (err) {
                console.error("Fetch Error:", err);
                container.innerHTML = `<tr><td colspan="4" class="px-8 py-10 text-center text-red-500 uppercase text-[10px] font-black italic">Database Error</td></tr>`;
            }
        }

        // Render Baris Tabel
        function renderOrders(orders) {
            const container = document.getElementById('orders-table-body');
            if (!orders || orders.length === 0) {
                container.innerHTML = `<tr><td colspan="4" class="px-8 py-24 text-center text-gray-700 uppercase text-[10px] font-black italic tracking-[0.3em] opacity-40">☕ No pending orders currently</td></tr>`;
                return;
            }

            container.innerHTML = orders.map(order => {
                const gameTitle = order.games ? order.games.title : `ID: ${order.game_id}`;
                const timeLabel = new Date(order.created_at).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                return `
                <tr class="hover:bg-white/[0.03] transition-colors">
                    <td class="px-6 md:px-8 py-6">
                        <div class="flex flex-col gap-2">
                            <span class="text-[9px] font-bold text-gray-500 font-mono tracking-tighter uppercase">UID: ${order.user_id.substring(0, 10)}...</span>
                            <a href="${order.proof_url}" target="_blank" class="w-fit bg-purple-500 hover:bg-purple-400 text-white text-[8px] px-3 py-1.5 rounded-lg font-black transition-all shadow-lg active:scale-95 uppercase">VIEW RECEIPT 👁️</a>
                        </div>
                    </td>
                    <td class="px-6 md:px-8 py-6">
                        <span class="text-[11px] font-black uppercase text-white tracking-tight block max-w-[150px] truncate">${gameTitle}</span>
                        <span class="md:hidden text-[8px] text-gray-600 font-bold uppercase mt-1 block">${timeLabel}</span>
                    </td>
                    <td class="px-6 md:px-8 py-6 hidden md:table-cell">
                        <span class="text-[10px] font-bold uppercase text-gray-500 italic">${new Date(order.created_at).toLocaleDateString()}</span>
                    </td>
                    <td class="px-6 md:px-8 py-6 text-right space-x-2 whitespace-nowrap">
                        <button onclick="updateStatus('${order.id}', 'approved')" 
                            class="bg-green-500 hover:bg-green-400 text-black text-[9px] font-black px-4 py-2 rounded-xl transition-all active:scale-90 shadow-lg shadow-green-500/10">
                            APPROVE
                        </button>
                        <button onclick="updateStatus('${order.id}', 'rejected')" 
                            class="bg-red-600 hover:bg-red-500 text-white text-[9px] font-black px-4 py-2 rounded-xl transition-all active:scale-90 shadow-lg">
                            REJECT
                        </button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        // Update Status (Approve / Reject)
        async function updateStatus(id, newStatus) {
            let rejectionMessage = null;

            if (newStatus === 'rejected') {
                rejectionMessage = prompt("Alasan penolakan:", "Bukti transfer tidak valid.");
                if (rejectionMessage === null) return;
            } else {
                if (!confirm(`Konfirmasi APPROVE pesanan?`)) return;
            }

            try {
                const { error } = await _supabase
                    .from('library')
                    .update({ 
                        status: newStatus,
                        rejection_message: rejectionMessage 
                    })
                    .eq('id', id);

                if (error) throw error;
                fetchOrders();
            } catch (err) {
                alert("Error: " + err.message);
            }
        }

        // Real-time Update
        function subscribeToChanges() {
            _supabase
                .channel('admin-realtime')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'library' }, (payload) => {
                    if (payload.eventType === 'INSERT') {
                        notifySound.play().catch(() => {});
                    }
                    fetchOrders();
                })
                .subscribe();
        }

        document.addEventListener('DOMContentLoaded', () => {
            protectPage();
            fetchOrders();
            subscribeToChanges();
        });
    </script>
</body>
</html>
