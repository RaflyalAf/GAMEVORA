<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reset Password | Gamevora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sat: env(safe-area-inset-top);
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #050505; 
            color: white; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        
        @media (max-width: 768px) {
            input { font-size: 16px !important; } /* Mencegah auto-zoom di iOS */
            .glass { border-radius: 35px; }
        }

        .text-gradient { 
            background: linear-gradient(to right, #a855f7, #60a5fa); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
    </style>
</head>
<body class="p-6">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] md:w-[500px] h-[300px] md:h-[500px] bg-purple-600/10 blur-[100px] md:blur-[120px] -z-10 animate-pulse"></div>

    <div class="glass w-full max-w-[400px] p-8 md:p-10 rounded-[45px] shadow-2xl relative z-50">
        <div class="text-center mb-10">
            <h2 class="text-2xl md:text-3xl font-black italic tracking-tighter text-gradient uppercase">Forgot Password?</h2>
            <p class="text-gray-500 text-[9px] font-black uppercase tracking-[0.3em] mt-3 opacity-80">Masukkan email untuk menerima link reset.</p>
        </div>

        <form id="forgot-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2">Email Address</label>
                <input type="email" id="email-reset" class="w-full bg-white/5 border border-white/10 rounded-[20px] px-6 py-4 outline-none focus:border-purple-500 transition-all text-sm md:text-base font-medium" placeholder="your@email.com" required>
            </div>
            
            <button type="submit" id="btn-reset" class="w-full bg-purple-600 text-white font-black py-4 md:py-5 rounded-[22px] hover:bg-purple-500 transition-all active:scale-95 shadow-xl shadow-purple-500/20 text-[11px] tracking-[0.2em] uppercase">
                SEND RESET LINK
            </button>
        </form>

        <div class="mt-10 text-center">
            <a href="login.html" class="text-[9px] font-black text-gray-600 hover:text-white transition uppercase tracking-[0.4em]">← Back to Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://meruqlvbymsaeaxybxaz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JpMK5MzO-awEkOOvr7t-xg_bBkobHLf'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const forgotForm = document.getElementById('forgot-form');
        const resetBtn = document.getElementById('btn-reset');

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email-reset').value;

            resetBtn.innerText = "SENDING REQUEST...";
            resetBtn.disabled = true;

            try {
                // Link ini akan mengarahkan user ke update-password.html setelah klik link di email
                const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/update-password.html',
                });

                if (error) {
                    throw error;
                } else {
                    alert("Tautan reset telah dikirim ke email kamu! Silakan cek folder inbox atau spam.");
                    resetBtn.innerText = "LINK SENT ✔";
                }
            } catch (err) {
                alert("Gagal mengirim link: " + err.message);
                resetBtn.innerText = "SEND RESET LINK";
                resetBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
