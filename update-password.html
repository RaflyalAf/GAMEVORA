<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>New Password | Gamevora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sat: env(safe-area-inset-top);
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #050505; 
            color: white; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        
        @media (max-width: 768px) {
            input { font-size: 16px !important; }
            .glass { border-radius: 35px; }
        }

        .text-gradient-green {
            background: linear-gradient(to right, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-6">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] md:w-[500px] h-[300px] md:h-[500px] bg-green-500/10 blur-[100px] md:blur-[120px] -z-10 animate-pulse"></div>

    <div class="glass w-full max-w-[400px] p-8 md:p-10 rounded-[45px] shadow-2xl relative z-50">
        <div class="text-center mb-10">
            <h2 class="text-2xl md:text-3xl font-black italic tracking-tighter text-gradient-green uppercase">New Password</h2>
            <p class="text-gray-500 text-[9px] font-black uppercase tracking-[0.3em] mt-3 opacity-80">Konfigurasi Akses Baru</p>
        </div>

        <form id="update-password-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2">New Secure Password</label>
                <input type="password" id="new-password" class="w-full bg-white/5 border border-white/10 rounded-[20px] px-6 py-4 outline-none focus:border-green-500 transition-all text-sm md:text-base font-medium" placeholder="Minimal 6 karakter" required>
            </div>
            
            <button type="submit" id="btn-update" class="w-full bg-green-500 text-black font-black py-4 md:py-5 rounded-[22px] hover:bg-green-400 transition-all active:scale-95 shadow-xl shadow-green-500/20 text-[11px] tracking-[0.2em] uppercase">
                UPDATE PASSWORD
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="login.html" class="text-[9px] font-black text-gray-600 hover:text-white transition uppercase tracking-[0.4em]">← Batal & Kembali</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://meruqlvbymsaeaxybxaz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JpMK5MzO-awEkOOvr7t-xg_bBkobHLf'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const updateForm = document.getElementById('update-password-form');
        const updateBtn = document.getElementById('btn-update');

        updateForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;

            if (newPassword.length < 6) {
                alert("Password minimal 6 karakter!");
                return;
            }

            updateBtn.innerText = "UPDATING VAULT...";
            updateBtn.disabled = true;

            try {
                const { error } = await _supabase.auth.updateUser({
                    password: newPassword
                });

                if (error) {
                    throw error;
                } else {
                    alert("Password berhasil diperbarui! Silakan login kembali.");
                    // Logout otomatis setelah ganti password untuk keamanan
                    await _supabase.auth.signOut();
                    window.location.href = "login.html";
                }
            } catch (err) {
                alert("Gagal memperbarui: " + err.message);
                updateBtn.innerText = "UPDATE PASSWORD";
                updateBtn.disabled = false;
            }
        });

        // Proteksi Halaman: Pastikan user datang dari link reset email
        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                alert("Sesi tidak valid atau kadaluarsa. Silakan minta tautan reset baru.");
                window.location.href = "login.html";
            }
        }
        checkSession();
    </script>
</body>
</html>
